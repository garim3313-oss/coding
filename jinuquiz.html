];

        function App() {
            const [screen, setScreen] = React.useState('home'); // 'home', 'quiz', 'result'
            const [quizList, setQuizList] = React.useState([]);
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [userGuess, setUserGuess] = React.useState('');
            const [feedback, setFeedback] = React.useState(null);

            // 퀴즈 시작 함수 (100개 중 랜덤 10개 추출)
            const startQuiz = () => {
                const shuffled = [...photoData].sort(() => 0.5 - Math.random());
                setQuizList(shuffled.slice(0, 10));
                setCurrentIndex(0);
                setScore(0);
                setFeedback(null);
                setUserGuess('');
                setScreen('quiz');
            };

            // 정답 제출 함수
            const handleSubmit = () => {
                if (userGuess === '') return alert('숫자를 입력해주세요!');
                
                const guess = parseInt(userGuess, 10);
                const actual = quizList[currentIndex].answerDays;
                const diff = Math.abs(guess - actual);
                
                let currentScore = 0;
                if (diff <= 10) currentScore = 10;
                else if (diff <= 30) currentScore = 8;
                else if (diff <= 50) currentScore = 5;
                else currentScore = 0;

                setScore(prev => prev + currentScore);
                setFeedback({ actual, currentScore });
            };

            // 다음 문제로 넘어가기
            const nextQuestion = () => {
                if (currentIndex + 1 < 10) {
                    setCurrentIndex(prev => prev + 1);
                    setUserGuess('');
                    setFeedback(null);
                } else {
                    setScreen('result');
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-lg overflow-hidden flex flex-col">
                    {/* 1. 첫 화면 */}
                    {screen === 'home' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
                            <h1 className="text-2xl font-bold mb-8 text-amber-600">이 진우는 생후 몇 일일까요?</h1>
                            <div className="w-64 h-64 bg-gray-200 rounded-full overflow-hidden mb-8 border-4 border-amber-200 shadow-md">
                                <img src="https://drive.google.com/thumbnail?id=1yQUs4VOfBL4jFrcDNsEl-fXoquStphNc&sz=w800" alt="진우 메인 사진" className="w-full h-full object-contain" />
                            </div>
                            <button 
                                onClick={startQuiz}
                                className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 px-12 rounded-full shadow-lg transition-transform transform hover:scale-105 text-lg"
                            >
                                퀴즈 시작
                            </button>
                        </div>
                    )}

                    {/* 2. 두 번째 화면 (퀴즈) */}
                    {screen === 'quiz' && quizList.length > 0 && (
                        <div className="flex-1 flex flex-col p-6">
                            <div className="flex justify-between items-center mb-4">
                                <span className="font-semibold text-gray-500">진행도: {currentIndex + 1} / 10</span>
                                <span className="font-bold text-amber-600">현재 점수: {score}점</span>
                            </div>
                            
                            <div className="w-full aspect-square bg-gray-100 rounded-2xl overflow-hidden mb-6 shadow-inner border border-gray-200">
                                <img src={quizList[currentIndex].imageUrl} alt="진우 퀴즈 사진" className="w-full h-full object-cover" />
                            </div>

                            {!feedback ? (
                                <div className="flex flex-col gap-3">
                                    <input 
                                        type="number" 
                                        value={userGuess}
                                        onChange={(e) => setUserGuess(e.target.value)}
                                        placeholder="생후 몇 일일까요? (숫자만)"
                                        className="w-full text-center text-xl p-4 border-2 border-gray-300 rounded-xl focus:outline-none focus:border-amber-500 transition-colors"
                                    />
                                    <button 
                                        onClick={handleSubmit}
                                        className="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md text-lg transition-colors"
                                    >
                                        제출
                                    </button>
                                </div>
                            ) : (
                                <div className="flex flex-col gap-3 text-center bg-gray-50 p-4 rounded-xl border border-gray-200">
                                    <p className="text-xl font-bold text-gray-800 mb-2">
                                        정답은 <span className="text-blue-600">{feedback.actual}일</span> 입니다!
                                    </p>
                                    <p className="text-lg mb-4">
                                        {feedback.currentScore === 10 && '🎯 대단해요!'}
                                        {feedback.currentScore === 8 && '👏 아깝네요!'}
                                        {feedback.currentScore === 5 && '👍 비슷했어요'}
                                        {feedback.currentScore === 0 && '😅 틀렸어요 ㅠㅠ'}
                                    </p>
                                    <button 
                                        onClick={nextQuestion}
                                        className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-md text-lg transition-colors"
                                    >
                                        {currentIndex === 9 ? '결과 보기' : '다음 문제'}
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 3. 세 번째 화면 (결과) */}
                    {screen === 'result' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-6 text-center">
                            <h2 className="text-3xl font-bold mb-4 text-gray-800">퀴즈 완료!</h2>
                            <div className="bg-amber-100 p-8 rounded-3xl mb-8 w-full shadow-inner border border-amber-200">
                                <p className="text-xl text-gray-600 mb-2">최종 점수</p>
                                <p className="text-6xl font-black text-amber-600 mb-4">{score}<span className="text-2xl text-amber-500"> / 100</span></p>
                                <p className="text-lg font-semibold text-gray-700">
                                    {score >= 80 ? '이 정도면 진우 본인 아닙니까? 🏆' : 
                                     score >= 60 ? '진우의 가족이 맞으시군요! 훌륭합니다. 👏' : 
                                     score >= 40 ? '관심 좀 더 가져주시면 좋을 거 같아요... 😥' : 
                                     '잘 모르시는군요... ☠️'}
                                </p>
                            </div>
                            <button 
                                onClick={() => setScreen('home')}
                                className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 px-12 rounded-full shadow-lg transition-transform transform hover:scale-105 text-lg"
                            >
                                다시하기
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        root.render(<App />);
