<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile Home</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        /* 아이콘이 눌릴 때 실제 앱처럼 쏙 들어가는 효과 */
        .app-icon:active {
            transform: scale(0.9);
            filter: brightness(0.8);
        }
    </style>
</head>
<body class="bg-gray-200">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // 시간 표시를 위한 상태 (실제 폰처럼 보이게!)
            const [time, setTime] = React.useState(new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }));

            React.useEffect(() => {
                const timer = setInterval(() => {
                    setTime(new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                /* 배경화면: 아이폰 느낌의 부드러운 그라데이션 */
                <div className="max-w-md mx-auto min-h-screen relative overflow-hidden shadow-2xl bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-300">
                    
                    {/* 상단 상태바 레이아웃 */}
                    <div className="flex justify-between items-center px-8 pt-4 pb-2 text-white font-semibold text-sm">
                        <span>{time}</span>
                        <div className="flex gap-2">
                            <span>📶</span>
                            <span>🔋</span>
                        </div>
                    </div>

                    {/* 메인 어플 그리드 영역 (4열 배치) */}
                    <div className="grid grid-cols-4 gap-y-8 gap-x-4 p-6 mt-4">
                        
                        {/* 1. 진우 퀴즈 앱 아이콘 */}
                        <a href="jinuquiz.html" className="flex flex-col items-center gap-1 group no-underline">
                            <div className="app-icon w-16 h-16 bg-amber-100 rounded-[1.2rem] shadow-lg flex items-center justify-center text-4xl transition-all duration-200 border-b-4 border-amber-200">
                                🍼
                            </div>
                            <span className="text-white text-xs font-medium drop-shadow-md">진우 퀴즈</span>
                        </a>

                        {/* 2. 리밸런싱 계산기 앱 아이콘 */}
                        <a href="rebalancing.html" className="flex flex-col items-center gap-1 group no-underline">
                            <div className="app-icon w-16 h-16 bg-blue-500 rounded-[1.2rem] shadow-lg flex items-center justify-center text-4xl transition-all duration-200 border-b-4 border-blue-600">
                                ⚖️
                            </div>
                            <span className="text-white text-xs font-medium drop-shadow-md">계산기</span>
                        </a>

                        {/* 나중에 다른 앱 만들면 아래 빈 아이콘 자리에 추가하시면 됩니다! */}
                        {/* 더미 아이콘 (미관용) */}
                        <div className="flex flex-col items-center gap-1 opacity-40">
                            <div className="w-16 h-16 bg-white/20 backdrop-blur-md rounded-[1.2rem] flex items-center justify-center text-2xl">
                                ➕
                            </div>
                            <span className="text-white/60 text-xs">추가 예정</span>
                        </div>
                    </div>

                    {/* 하단 독(Dock) 영역: 자주 쓰는 앱 느낌 */}
                    <div className="absolute bottom-8 left-1/2 -translate-x-1/2 w-[90%] bg-white/30 backdrop-blur-xl rounded-[2.5rem] p-4 flex justify-around shadow-xl border border-white/20">
                        <div className="w-14 h-14 bg-green-500 rounded-2xl shadow-inner flex items-center justify-center text-3xl">📞</div>
                        <div className="w-14 h-14 bg-white rounded-2xl shadow-inner flex items-center justify-center text-3xl font-bold text-blue-500">G</div>
                        <div className="w-14 h-14 bg-yellow-400 rounded-2xl shadow-inner flex items-center justify-center text-3xl">💬</div>
                        <div className="w-14 h-14 bg-pink-500 rounded-2xl shadow-inner flex items-center justify-center text-3xl text-white">📸</div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
