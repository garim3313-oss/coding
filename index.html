<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Galaxy Home</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #e5e7eb; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        .app-icon:active {
            transform: scale(0.85);
            filter: brightness(0.8);
            transition: transform 0.1s;
        }
        .squircle {
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [time, setTime] = React.useState(new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }));

            React.useEffect(() => {
                const timer = setInterval(() => {
                    setTime(new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="relative w-[375px] h-[812px] bg-gray-900 rounded-[45px] shadow-2xl p-[6px] border-2 border-gray-600">
                    
                    {/* 측면 물리 버튼 */}
                    <div className="absolute top-[140px] -right-[4px] w-[4px] h-[100px] bg-gray-700 rounded-r-md"></div>
                    <div className="absolute top-[260px] -right-[4px] w-[4px] h-[50px] bg-gray-700 rounded-r-md"></div>

                    {/* 실제 화면 영역 */}
                    <div className="relative w-full h-full bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-300 rounded-[38px] overflow-hidden flex flex-col">
                        
                        {/* 상단 펀치홀 카메라 */}
                        <div className="absolute top-[12px] left-1/2 transform -translate-x-1/2 w-[16px] h-[16px] bg-black rounded-full z-50 shadow-inner"></div>

                        {/* 상단 상태바 */}
                        <div className="absolute top-0 w-full flex justify-between items-center px-6 pt-3 text-white font-bold text-[13px] z-40">
                            <span>{time}</span>
                            <div className="flex gap-2 items-center">
                                <span className="text-[10px]">VoLTE</span>
                                <span>📶</span>
                                <span>🔋</span>
                            </div>
                        </div>

                        {/* 어플 아이콘 영역 */}
                        <div className="pt-20 px-6 grid grid-cols-4 gap-y-8 gap-x-4 flex-1">
                            <a href="jinuquiz.html" className="flex flex-col items-center gap-1 no-underline">
                                <div className="app-icon w-[60px] h-[60px] bg-amber-100 squircle shadow-md flex items-center justify-center text-3xl">🍼</div>
                                <span className="text-white text-[12px] font-medium drop-shadow-md">진우 퀴즈</span>
                            </a>
                            
                            <a href="rebalancing.html" className="flex flex-col items-center gap-1 no-underline">
                                <div className="app-icon w-[60px] h-[60px] bg-blue-500 squircle shadow-md flex items-center justify-center text-3xl border-b-2 border-blue-600">⚖️</div>
                                <span className="text-white text-[12px] font-medium drop-shadow-md">계산기</span>
                            </a>

                            <div className="flex flex-col items-center gap-1 opacity-50">
                                <div className="w-[60px] h-[60px] bg-white/20 backdrop-blur-md squircle flex items-center justify-center text-3xl">➕</div>
                                <span className="text-white/80 text-[12px]">추가 예정</span>
                            </div>
                        </div>

                        {/* 하단 독(Dock) 영역 */}
                        <div className="w-[92%] mx-auto bg-white/20 backdrop-blur-xl rounded-3xl p-3 flex justify-around items-center shadow-lg mb-4 z-40">
                            <div className="w-[56px] h-[56px] bg-green-500 rounded-full shadow-inner flex items-center justify-center text-[28px]">📞</div>
                            <div className="w-[56px] h-[56px] bg-white rounded-full shadow-inner flex items-center justify-center text-[28px] font-bold text-blue-500">G</div>
                            <div className="w-[56px] h-[56px] bg-yellow-400 rounded-full shadow-inner flex items-center justify-center text-[28px]">💬</div>
                            <div className="w-[56px] h-[56px] bg-pink-500 rounded-full shadow-inner flex items-center justify-center text-[28px]">📸</div>
                        </div>

                        {/* 안드로이드 하단 3버튼 내비게이션 바 */}
                        <div className="h-[48px] w-full flex justify-around items-center px-10 pb-2 z-50">
                            <div className="flex flex-col gap-[3px] opacity-70">
                                <div className="w-[18px] h-[2px] bg-white"></div>
                                <div className="w-[18px] h-[2px] bg-white"></div>
                                <div className="w-[18px] h-[2px] bg-white"></div>
                            </div>
                            <div className="w-[16px] h-[16px] border-[2px] border-white rounded-[4px] opacity-70"></div>
                            <div className="w-[14px] h-[14px] border-t-[2px] border-r-[2px] border-white transform -rotate-135 opacity-70"></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
